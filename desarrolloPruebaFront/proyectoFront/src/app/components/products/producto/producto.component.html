 <!-- Registrar Producto -->
<<div class="container mt-5">
  <div class="card shadow-sm mb-4">
    <div class="card-header d-flex justify-content-between align-items-center bg-secondary text-white">
      <h5 class="mb-0">Registrar Producto</h5>
      <div>
        <button class="btn btn-sm btn-light me-2">
          <i class="bi bi-pencil-fill"></i> Editar
        </button>
        <button class="btn btn-sm btn-danger">
          <i class="bi bi-trash-fill"></i> Eliminar
        </button>
      </div>
    </div>

    <div class="card-body">
      <form>
        <div class="mb-3">
          <label for="IDMATERIAL" class="form-label">Cliente</label>
          <div class="input-group">
            <input type="text" class="form-control" id="IDMATERIAL" placeholder="Selecciona un cliente" readonly>
            <button class="btn btn-outline-secondary" type="button" data-bs-toggle="modal"
              data-bs-target="#modalClientes">
              Buscar
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label for="DESCRIPCION" class="form-label">Descripcion</label>
          <input type="text" class="form-control" id="DESCRIPCION" placeholder="Descripcion del producto">
        </div>

        <div class="mb-3">
          <label for="UNIDADMEDIDA" class="form-label">Unidad de Medida</label>
          <input type="number" class="form-control" id="UNIDADMEDIDA" placeholder="Unidad de medida del producto">
        </div>

        <div class="mb-3">
          <label for="PRECIO1" class="form-label">Precio</label>
          <input type="number" class="form-control" id="PRECIO1" placeholder="Precio del producto">
        </div>

        <button type="submit" class="btn btn-success w-100">Guardar Producto</button>
      </form>
    </div>
  </div>
</div>
